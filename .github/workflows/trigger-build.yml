name: Trigger Mizuki Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  dispatch:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Mizuki workflow_dispatch
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.DISPATCH_TOKEN }}
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: 'Admilkk',
              repo: 'Mizuki',
              workflow_id: 'deploy.yml',
              ref: 'master'
            });
